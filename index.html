<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NeuroGen Studio — Создавайте сайты будущего с помощью ИИ</title>
    <meta
      name="description"
      content="Универсальная платформа для создания, редизайна и деплоя сайтов с помощью искусственного интеллекта"
    />
    <script type="module" crossorigin src="/assets/index-DOLkvRFv.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-DryNKR7j.css">
  </head>
  <body>
    <!-- Landing Page Container -->
    <div id="landing-container"></div>

    <!-- React App Container (hidden by default) -->
    <div id="root" style="display: none"></div>

    <!-- Auth Guard -->
    <script src="/auth.js"></script>

    <!-- Load Landing Page First -->
    <script>
      // Проверяем, авторизован ли пользователь
      const token = localStorage.getItem("ng_token");
      const isAuthenticated = localStorage.getItem("isAuthenticated");

      if (!token || isAuthenticated !== "true") {
        // Показываем лендинг
        fetch("/landing.html")
          .then((response) => response.text())
          .then((html) => {
            document.getElementById("landing-container").innerHTML = html;
            document.getElementById("root").style.display = "none";
          });
      } else {
        // Показываем React приложение
        document.getElementById("landing-container").style.display = "none";
        document.getElementById("root").style.display = "block";
      }
    </script>

    <!-- React App -->
  </body>
</html>
